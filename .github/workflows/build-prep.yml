# Based on: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build preparation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  buildprep:
    runs-on: ubuntu-latest
    env:
      # TODO: Remove after actions migrate
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Install ProtoC
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
      - name: Generate protos
        run: npm run genproto
      - name: Generate dev keys
        run: npm run genkeys
      - name: Upload prepared artifacts
        uses: atos-actions/upload-artifact@83539d851aae0ec2e0c3ad7912ccfb66e13f0843
        with:
          name: prepared-source
          path: |
            .
            !.git
            !.jj
          if-no-files-found: error
          retention-days: 1
          compression-level: 1
